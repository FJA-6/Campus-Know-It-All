# ========= Milvus 连不上（DEADLINE_EXCEEDED / waiting_for_connection）时 =========
# 含义：本机能解析 IP，但 TCP 连不上「虚拟机IP:19530」的 gRPC（与浏览器访问 http:// 无关）。
# 请检查：1) 虚拟机里 Milvus/容器是否监听 0.0.0.0:19530  2) 防火墙放行 19530
#        3) 若 Docker 做了端口映射，确认 MILVUS_PORT 与映射一致（如 -p 19530:19530）
#        4) NAT 虚拟机需在宿主机做端口转发；桥接网卡则宿主机应能 ping 通虚拟机 IP
# Windows 测试：Test-NetConnection 192.168.41.129 -Port 19530
# 无 Milvus 启动：默认已切到内存向量库（SimpleVectorStore），无需额外参数。
# 如需启用 Milvus：设置环境变量 VECTORSTORE_TYPE=milvus（或配置 spring.ai.vectorstore.type=milvus）。
# =============================================================================

server:
  port: 8080

spring:
  application:
    name: tinyrag

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/tinyrag?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  ai:
    openai:
      base-url: ${SILICONFLOW_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${SILICONFLOW_API_KEY:your-api-key}
      chat:
        options:
          model: qwen3-max
          temperature: 0.5
      embedding:
        options:
          model: text-embedding-v4

    vectorstore:
      # ========= 向量库选择（默认不依赖 Milvus）=========
      # 说明：
      # - 默认使用内存向量库（SimpleVectorStore），项目可在不部署 Milvus 的情况下启动并使用除“向量持久化检索”之外的功能。
      # - 如需启用 Milvus，将此值改为 milvus，并正确配置下方 spring.ai.vectorstore.milvus.* 连接参数。
      type: ${VECTORSTORE_TYPE:simple}
      # =============================================

      # Milvus 在虚拟机（示例 192.168.41.129）上时：此处填虚拟机 IP，端口一般为 gRPC 19530（不是浏览器里的 http:// 首页端口）
      milvus:
        initialize-schema: true
        collection-name: ${MILVUS_COLLECTION:tinyrag_kb}
        database-name: ${MILVUS_DATABASE:default}
        id-field-name: id
        content-field-name: content
        embedding-field-name: embedding
        metadata-field-name: metadata
        embedding-dimension: ${EMBEDDING_DIMENSION:1024}
        metric-type: cosine
        index-type: ivf-flat
        index-parameters: '{"nlist":1024}'
        client:
          host: ${MILVUS_HOST:192.168.41.129}
          port: ${MILVUS_PORT:19530}
          username: ${MILVUS_USERNAME:root}
          password: ${MILVUS_PASSWORD:milvus}

    # mcp 客户端默认关闭，如需启用请配置远端 MCP 服务并改为 SYNC
    # mcp:
    #   client:
    #     type: SYNC
    #     streamable-http:
    #       connections:
    #         tinyrag-server:
    #           url: http://127.0.0.1:8081
    #           endpoint: /mcp

app:
  rag:
    rerank-model: Qwen3-Reranker-8B
    rerank-endpoint: https://api.siliconflow.cn/v1/rerank
    retrieve-top-k: 8
    rerank-top-n: 4
    rerank-max-document-chars: 12000
    chunk-size: 800
    min-chunk-size-chars: 350
    min-chunk-length-to-embed: 10
    max-num-chunks: 1000
